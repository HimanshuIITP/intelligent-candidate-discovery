ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  - "CodeRabbit"
  - "Google Gemini"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Used an AI coding assistant (Claude/Gemini) for architectural planning, discussing logic for honeypot rules, and writing the Python boilerplate. CodeRabbit was used for code review. Absolutely no hackathon candidate JSON data was fed into any external APIs or LLMs.
  AI was used in designing logic.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A fully offline CPU-optimized hybrid ranking system working through 100K profiles within 4 minutes.
  
  
  To overcome the problem with the computing power bottleneck, we implement a "Two-Stage Funnel": Rank-BM25 quickly pre-ranks the data to retain only top 1,000 candidates allowing us to leverage heavy local Semantic Embeddings (SentenceTransformers) over only a fraction of potential candidates.

  Score is far from a mere count of keywords because of the "Career Evidence Graph" model in which a semantic match of a candidate is additionally multiplied by structural factors such as product company experience and notice period. To prevent abuse with keyword stuffing, proficiency of a skill is mathematically penalized for lack of endorsements or experience period.

  We constructed 12 strict "Honeypot" detection rules that proactively detect fabricated CVs (such as reversed timeline, salary inversion, too large list of skills without any endorsements). False profiles are heavily penalized. Lastly, behavioral multiplier drops scores of inactive candidates by 50%.
  
  No explanations whatsoever are generated by an LLM; they are crafted deterministically via string templates.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: false         # I have tested that my reproduce_command runs end-to-end
